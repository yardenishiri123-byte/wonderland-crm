<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="פרויקטים">
<meta name="theme-color" content="#FAF8F4">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>💼 ניהול פרויקטים</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAF8F4;--surface:#F2EDE5;--surface2:#E9E2D7;
  --border:#DDD5C7;--text:#2A2520;--muted:#8A7E74;--white:#FFFFFF;
  --green:#5E9464;--green-bg:#E2F0E3;
  --amber:#A07230;--amber-bg:#F5E8CE;
  --red:#A84848;--red-bg:#F5DEDE;
  --blue:#4268A0;--blue-bg:#D8E5F5;
  --bordeaux:#7D2442;--bordeaux-bg:#F7E5EB;
  --purple:#6B4FA0;--purple-bg:#EDE6F7;
  --r:12px;--rs:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;font-size:15px}

/* GATE */
.gate{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px}
.gate.hidden{display:none}
.gate-logo{font-size:42px;margin-bottom:10px}
.gate-title{font-size:20px;font-weight:700;margin-bottom:6px}
.gate-sub{font-size:13px;color:var(--muted);margin-bottom:32px}
.gate-input{width:100%;max-width:280px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);padding:14px 16px;font-size:22px;font-weight:600;color:var(--text);font-family:inherit;text-align:center;letter-spacing:8px;-webkit-appearance:none;outline:none;transition:border-color .15s}
.gate-input:focus{border-color:var(--text);background:var(--white)}
.gate-btn{width:100%;max-width:280px;background:var(--text);color:var(--bg);border:none;border-radius:var(--rs);padding:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:12px}
.gate-err{font-size:13px;color:var(--red);margin-top:10px;min-height:18px;text-align:center}

/* LOADING OVERLAY */
.loading-screen{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.loading-screen.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--bordeaux);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--muted)}

/* HEADER */
.header{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 18px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between}
.header-left h1{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.header-left span{font-size:12px;color:var(--muted);display:block;margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px}
.btn-export{background:transparent;border:1px solid var(--border);border-radius:var(--rs);padding:6px 11px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit}
.btn-export:active{opacity:.7}

/* SYNC INDICATOR */
.sync-wrap{display:flex;align-items:center;gap:5px;cursor:default;user-select:none}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sync-ok .sync-dot{background:var(--green)}
.sync-syncing .sync-dot{background:var(--amber);animation:pulse .9s infinite}
.sync-offline .sync-dot{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.sync-label{font-size:11px;color:var(--muted)}

/* SUMMARY */
.summary{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:14px 18px}
.s-card{background:var(--surface);border-radius:var(--rs);padding:11px 10px;text-align:center}
.s-label{font-size:11px;color:var(--muted);margin-bottom:3px}
.s-val{font-size:18px;font-weight:700;color:var(--text);direction:ltr;display:inline-block}
.s-val.green{color:var(--green)}
.s-val.bordeaux{color:var(--bordeaux)}

/* TABS */
.tabs{display:flex;gap:7px;padding:0 18px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:var(--surface);border:none;border-radius:20px;padding:7px 14px;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
.tab.active{background:var(--text);color:var(--bg)}
.tab:active{opacity:.8}

/* CARDS */
.list{padding:0 18px 100px;display:flex;flex-direction:column;gap:6px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:10px 13px;cursor:pointer;transition:transform .1s}
.card:active{transform:scale(.98)}
.card-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.card-name{font-size:14px;font-weight:600;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-client{font-size:11px;color:var(--muted)}
.card-amount{font-size:15px;font-weight:700;white-space:nowrap;direction:ltr;color:var(--text);flex-shrink:0}
.card-row2{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.badges{display:flex;gap:4px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:0.1px}
/* payment: green = paid, blue = invoice, red = unpaid */
.bg{background:#D4EDDA;color:#2D6A35;border:1px solid rgba(45,106,53,.18)}
.ba{background:#FDE8C8;color:#8A5A10;border:1px solid rgba(138,90,16,.18)}
.br{background:#FAD9D9;color:#922A2A;border:1px solid rgba(146,42,42,.18)}
.bb{background:#D6E8FA;color:#2A5090;border:1px solid rgba(42,80,144,.18)}
.bgr{background:#EBE7E1;color:#6E625A;border:1px solid rgba(110,98,90,.15)}
.bbx{background:#F5DCEA;color:#7D2442;border:1px solid rgba(125,36,66,.18)}
.bpu{background:#E8E0F5;color:#5A3A90;border:1px solid rgba(90,58,144,.18)}
.card-meta{font-size:11px;color:var(--muted);margin-right:auto}
.card-notes{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4;border-top:1px solid var(--border);padding-top:5px}

/* BOTTOM BAR */
.bar{position:fixed;bottom:0;left:0;right:0;background:var(--text);color:var(--bg);padding:13px 18px;display:flex;justify-content:space-between;align-items:center;z-index:20}
.bar-left{line-height:1.4}
.bar-label{font-size:12px;opacity:.65}
.bar-count{font-size:11px;opacity:.5}
.bar-sum{font-size:19px;font-weight:700;direction:ltr}

/* FAB */
.fab{position:fixed;bottom:68px;left:18px;width:50px;height:50px;border-radius:50%;background:var(--bordeaux);color:#fff;border:none;font-size:26px;font-weight:300;cursor:pointer;z-index:21;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(125,36,66,.35)}
.fab:active{opacity:.85;transform:scale(.93)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:.7}
.empty-title{font-size:16px;font-weight:600;margin-bottom:5px}
.empty-sub{font-size:13px;color:var(--muted)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 18px 44px;width:100%;max-width:600px;max-height:94vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-handle{width:38px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 18px}
.modal-title{font-size:17px;font-weight:600;margin-bottom:18px}
.fg{margin-bottom:14px}
.fg label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
.fi,.fs,.ft{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;font-size:15px;color:var(--text);font-family:inherit;direction:rtl;-webkit-appearance:none;outline:none;transition:border-color .15s}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--text);background:var(--white)}
.ft{resize:none;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-save{width:100%;background:var(--text);color:var(--bg);border:none;border-radius:var(--rs);padding:14px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:6px}
.btn-del{width:100%;background:transparent;color:var(--red);border:1px solid var(--red-bg);border-radius:var(--rs);padding:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:8px}

/* SEARCH */
.search-wrap{padding:0 18px 10px}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 13px;font-size:14px;color:var(--text);font-family:inherit;direction:rtl;-webkit-appearance:none;outline:none}
.search-input:focus{border-color:var(--text);background:var(--white)}

/* MONTHLY VIEW */
.month-group{margin-bottom:8px}
.month-header{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;cursor:pointer;user-select:none;-webkit-user-select:none}
.month-header.current{background:var(--bordeaux);border-color:var(--bordeaux);color:#fff}
.month-header.open{border-radius:var(--r) var(--r) 0 0;border-bottom-color:transparent}
.month-header:active{opacity:.85}
.month-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.month-title{font-size:15px;font-weight:700}
.month-right{display:flex;align-items:center;gap:10px}
.month-sum{font-size:16px;font-weight:700;direction:ltr}
.month-chevron{font-size:10px;transition:transform .2s;display:inline-block;opacity:.7}
.month-header.open .month-chevron{transform:rotate(180deg)}
.month-meta{font-size:12px;margin-bottom:8px;opacity:.7}
.month-bar{height:5px;border-radius:3px;display:flex;overflow:hidden;background:rgba(0,0,0,.1)}
.month-bar-seg{height:100%}
.month-legend{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.month-legend-item{font-size:11px;display:flex;align-items:center;gap:3px;opacity:.85}
.month-legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.month-header:not(.current) .month-meta{color:var(--muted)}
.month-header:not(.current) .month-title,.month-header:not(.current) .month-sum{color:var(--text)}
.month-header:not(.current) .month-legend-item{color:var(--muted)}
.month-cards{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:8px;display:flex;flex-direction:column;gap:6px;background:var(--bg)}
.month-cards .card{border-radius:var(--rs)}

/* GRAPH */
.graph-wrap{padding:0 0 12px}
.graph-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.graph-title{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text)}
.graph-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.month-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
.month-row-item{background:var(--surface);border-radius:var(--rs);padding:9px 12px;display:flex;justify-content:space-between;align-items:center}
.month-row-item.highlight{background:var(--bordeaux-bg)}
.mri-label{font-size:12px;color:var(--muted)}
.mri-val{font-size:13px;font-weight:700;direction:ltr;color:var(--text)}
.mri-val.bordeaux{color:var(--bordeaux)}

/* QUICK ADD */
.quick-add{display:flex;gap:7px;padding:0 18px 12px;align-items:center}
.qa-name{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 13px;font-size:14px;color:var(--text);font-family:inherit;direction:rtl;outline:none;-webkit-appearance:none}
.qa-name:focus{border-color:var(--text);background:var(--white)}
.qa-amount{width:90px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 10px;font-size:14px;color:var(--text);font-family:inherit;direction:ltr;outline:none;-webkit-appearance:none}
.qa-amount:focus{border-color:var(--text);background:var(--white)}
.qa-btn{background:var(--bordeaux);color:#fff;border:none;border-radius:var(--rs);padding:9px 16px;font-size:20px;font-weight:300;cursor:pointer;flex-shrink:0;line-height:1}
.qa-btn:active{opacity:.8}
/* CLIENT MODAL */
.client-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.client-modal-name{font-size:18px;font-weight:700}
.client-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.client-stat{background:var(--surface);border-radius:var(--rs);padding:10px;text-align:center}
.client-stat-label{font-size:10px;color:var(--muted);margin-bottom:3px}
.client-stat-val{font-size:15px;font-weight:700;direction:ltr}
.client-name-link{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px}

/* EFFORT */
.estar{font-size:22px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .1s}
.estar:active{transform:scale(1.25)}
.effort-badge{font-size:10px;padding:2px 6px;border-radius:20px;background:var(--surface2);color:var(--muted)}
/* AGING */
.card.age-warn{border-color:var(--amber)!important;border-width:1.5px!important}
.card.age-danger{border-color:var(--red)!important;border-width:2px!important}
.age-chip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.age-chip.warn{background:var(--amber-bg);color:var(--amber)}
.age-chip.danger{background:var(--red-bg);color:var(--red)}
/* DUP BTN */
.dup-btn{font-size:13px;background:none;border:none;cursor:pointer;opacity:.3;padding:2px 3px;border-radius:4px;flex-shrink:0;line-height:1}
.dup-btn:active{opacity:1;transform:scale(.9)}

/* QUICK STATUS MENU */
.pay-btn{cursor:pointer;transition:opacity .1s;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.pay-btn:active{opacity:.6;transform:scale(.95)}
/* overlay blocks taps outside */
.qm-overlay{position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.25)}
/* desktop dropdown */
#quick-menu{position:fixed;z-index:200;background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 6px 24px rgba(0,0,0,.2);min-width:210px;padding:5px 0;display:none}
/* mobile bottom sheet override */
#quick-menu.sheet{top:auto!important;left:0!important;right:0!important;bottom:0;width:100%;min-width:unset;border-radius:20px 20px 0 0;border:none;padding:0 0 env(safe-area-inset-bottom,10px)}
.qm-title{font-size:12px;color:var(--muted);text-align:center;padding:12px 16px 6px;border-bottom:1px solid var(--border);margin-bottom:4px}
.qm-item{padding:14px 20px;font-size:15px;cursor:pointer;font-family:inherit;border:none;background:none;width:100%;text-align:right;color:var(--text);display:flex;align-items:center;gap:10px;direction:rtl;line-height:1.3}
.qm-item:active{background:var(--surface)}
.qm-item.qm-active{font-weight:700;color:var(--bordeaux)}
.qm-check{margin-right:auto;font-size:13px;color:var(--bordeaux)}

/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(10px);background:#2A2520;color:#fff;border-radius:var(--r);padding:11px 16px;font-size:14px;display:flex;align-items:center;gap:12px;z-index:300;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;max-width:calc(100% - 36px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast-undo{background:none;border:none;color:#F0C070;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;padding:0;white-space:nowrap}
/* SWIPE HINT */
.swipe-hint{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(42,37,32,.9);color:#fff;border-radius:var(--r);padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:10px;z-index:250;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;max-width:calc(100% - 36px);white-space:nowrap}
.swipe-hint.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.sh-close{background:none;border:none;color:rgba(255,255,255,.6);font-size:16px;cursor:pointer;padding:0 0 0 4px;line-height:1;flex-shrink:0}
/* NOTE EDITOR */
.note-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.note-overlay.open{display:flex}
.note-modal{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 18px 44px;width:100%;max-width:600px}
.note-project-name{font-size:13px;color:var(--muted);margin-bottom:12px}
.note-edit-btn{font-size:11px;background:none;border:none;cursor:pointer;color:var(--muted);padding:2px 4px;opacity:.5;flex-shrink:0;font-family:inherit}
.note-edit-btn:active{opacity:1}
/* QUICK ADD category */
.qa-cat{width:74px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 5px;font-size:12px;color:var(--muted);font-family:inherit;direction:rtl;-webkit-appearance:none;outline:none}
.qa-cat:focus{border-color:var(--text);color:var(--text)}

/* PROJECT STATUS badges - distinct from payment */
.bov{background:#E2EDD8;color:#3A5E28;border:1px solid rgba(58,94,40,.18)} /* בוצע - olive */
.bip{background:#FDF0D8;color:#7A4E10;border:1px solid rgba(122,78,16,.18)} /* בתהליך - warm amber */

/* SWIPE ACTIONS */
.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--rs);margin-bottom:0}
.swipe-bg-r,.swipe-bg-l{position:absolute;top:0;bottom:0;width:50%;display:flex;align-items:center;font-size:12px;font-weight:700;opacity:0;transition:opacity .1s;pointer-events:none}
.swipe-bg-r{left:0;background:#D4EDDA;color:#2D6A35;padding-right:18px;justify-content:flex-end}
.swipe-bg-l{right:0;background:#FDF0D8;color:#7A4E10;padding-left:18px;justify-content:flex-start}
.swipe-wrap .card{position:relative;z-index:1;margin-bottom:0;will-change:transform}
</style>
</head>
<body>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-logo">💼</div>
  <div class="gate-title">ניהול פרויקטים</div>
  <div class="gate-sub">הכנסי קוד כניסה</div>
  <input class="gate-input" id="gate-input" type="password" inputmode="numeric" maxlength="10" placeholder="••••" onkeydown="if(event.key==='Enter')gateSubmit()">
  <button class="gate-btn" onclick="gateSubmit()">כניסה</button>
  <div class="gate-err" id="gate-err"></div>
</div>

<!-- LOADING -->
<div class="loading-screen hidden" id="loading-screen">
  <div class="spinner"></div>
  <div class="loading-text">טוענת נתונים...</div>
</div>

<div class="header">
  <div class="header-left">
    <h1>💼 ניהול פרויקטים</h1>
    <span id="month-label"></span>
  </div>
  <div class="header-right">
    <div class="sync-wrap sync-ok" id="sync-wrap" title="סטטוס סנכרון">
      <div class="sync-dot"></div>
      <span class="sync-label" id="sync-label">מסונכרן</span>
    </div>
    <button class="btn-export" onclick="exportData()">ייצוא ↓</button>
  </div>
</div>

<div class="summary">
  <div class="s-card">
    <div class="s-label" id="s-label-1">סה״כ ₪</div>
    <div class="s-val green" id="c-sum">0</div>
  </div>
  <div class="s-card">
    <div class="s-label" id="s-label-2">החודש ₪</div>
    <div class="s-val green" id="c-month">0</div>
  </div>
  <div class="s-card">
    <div class="s-label">לגביה</div>
    <div class="s-val bordeaux" id="c-pending">0</div>
  </div>
  <div class="s-card">
    <div class="s-label">פרויקטים</div>
    <div class="s-val" id="c-total">0</div>
  </div>
  <div class="s-card" style="grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;padding:11px 14px">
    <div>
      <div class="s-label">חודש הכי טוב 🏆</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px" id="best-month-label">—</div>
    </div>

function toDb(p){

// ── SYNC STATUS
function setSyncStatus(status){
  const wrap = document.getElementById('sync-wrap');
  const lbl = document.getElementById('sync-label');
  wrap.className = 'sync-wrap sync-' + status;
  lbl.textContent = status === 'ok' ? 'מסונכרן' : status === 'syncing' ? 'מסנכרן...' : 'לא מחובר';
}

// ── INIT DATA (load from Supabase)
async function initData(){
  document.getElementById('loading-screen').classList.remove('hidden');
  setSyncStatus('syncing');
  try {
    const { data: rows, error } = await sb.from('crm_projects').select('*').order('created_at', { ascending: false });
    if(error) throw error;

    if(rows.length === 0){
      // First time — push local seed + historical to Supabase
      const local = JSON.parse(localStorage.getItem('crm_v2') || '[]');
      const toUpload = local.length > 0 ? local : [..._seed, ..._historical];
      // Apply migrations on upload
      const migrated = toUpload.map(p => ({
        ...p,
        pay: p.pay === 'נשלחה חשבונית' ? 'נשלחה דרישת תשלום' : p.pay
      }));
      const dbRows = migrated.map(toDb);
      // Supabase has limit on upsert size — batch if needed
      for(let i = 0; i < dbRows.length; i += 50){
        const batch = dbRows.slice(i, i + 50);
        const { error: err } = await sb.from('crm_projects').upsert(batch, { onConflict: 'id' });
        if(err) throw err;
      }
      data = migrated;
    } else {
      data = rows.map(fromDb);
    }

    // Update local cache
    localStorage.setItem('crm_v2', JSON.stringify(data));
    setSyncStatus('ok');
  } catch(e){
    console.error('Supabase error:', e);
    // Fall back to localStorage
    const local = JSON.parse(localStorage.getItem('crm_v2') || '[]');
    data = local.length > 0 ? local : [..._seed, ..._historical];
    setSyncStatus('offline');
  }
  document.getElementById('loading-screen').classList.add('hidden');
  render();
}

    if(error) throw error;
    setSyncStatus('ok');
  } catch(e){
    console.error('Sync error:', e);
    setSyncStatus('offline');
  }
}
async function deleteProject(id){
  setSyncStatus('syncing');
  try {
    const { error } = await sb.from('crm_projects').delete().eq('id', id);
    if(error) throw error;
    setSyncStatus('ok');
  } catch(e){
    console.error('Sync error:', e);
    setSyncStatus('offline');
  }
}

function fmt(n){ if(!n && n!==0) return ''; return '₪' + Number(n).toLocaleString('he-IL') }
function fmtDate(d){ if(!d) return ''; const p=d.split('-'); return p[2]+'/'+p[1] }
function today(){ return new Date().toISOString().split('T')[0] }
function monthKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0') }
function getQ(){ return (document.getElementById('search')||{}).value?.trim().toLowerCase()||'' }

function clientFreqMap(){
  const m = {};

}
function catBadge(c){
  if(!c) return '';
  const m = {קמפיין:'bb', אירוע:'bg', עמלות:'ba', שונה:'bgr'};
  return `<span class="badge ${m[c]||'bgr'}">${c}</span>`;
}
function spBadge(s){ const m={'טרם החל':'bgr','בתהליך':'bip','בוצע':'bov'}; return `<span class="badge ${m[s]||'bgr'}">${s}</span>` }
function payBadge(s){
  const cls={'טרם שולם':'br','נשלחה דרישת תשלום':'bb','שולם במלואו':'bg'};
  const pre={'טרם שולם':'','נשלחה דרישת תשלום':'📤 ','שולם במלואו':'✓ '};
  return `<span class="badge ${cls[s]||'bgr'}">${(pre[s]||'')+s}</span>`;
}

function esc(s){return (s||'').replace(/'/g,"\\'");}

function getFiltered(){
  const now = new Date(); const q = getQ();
  return data.filter(p=>{
    if(filter==='month'){
      if(!p.exec) return false;
      const d = new Date(p.exec+'T12:00:00');
      if(d.getMonth()!==now.getMonth()||d.getFullYear()!==now.getFullYear()) return false;
    }
    if(filter==='unpaid' && (p.pay!=='טרם שולם' || p.sp!=='בוצע')) return false;
    if(filter==='invoice' && p.pay!=='נשלחה דרישת תשלום') return false;
    if(filter==='done' && p.pay!=='שולם במלואו') return false;
    if(q && !p.name?.toLowerCase().includes(q) && !p.client?.toLowerCase().includes(q) && !p.cat?.toLowerCase().includes(q)) return false;
    return true;
  });
}

    const d = new Date(p.exec+'T12:00:00');
    const key = monthKey(d);
    if(!groups[key]) groups[key] = {key, year:d.getFullYear(), month:d.getMonth(), total:0, paid:0, invoice:0, unpaid:0};
    const amt = Number(p.amount)||0;
    groups[key].total += amt;
    if(p.pay==='שולם במלואו') groups[key].paid += amt;
    else if(p.pay==='נשלחה דרישת תשלום') groups[key].invoice += amt;
    else groups[key].unpaid += amt;
  });
  const sorted = Object.values(groups).sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
  const bars = sorted.slice(-12);
  const now = new Date();
  const currentKey = monthKey(now);
  const maxVal = Math.max(...bars.map(b=>b.total), 1);
  const chartH = 160;
  const barCount = bars.length;
  const totalW = Math.max(barCount*52, 300);
  const barW = Math.min(44, Math.floor(totalW/barCount)-8);

  const svgBars = bars.map((b,i)=>{
    const x = i*(totalW/barCount)+(totalW/barCount-barW)/2;
    const bh = Math.max(4,(b.total/maxVal)*chartH);
    const y = chartH-bh;
    const isCur = b.key === currentKey;
    const fill = isCur ? 'var(--bordeaux)' : 'var(--green)';
    const lbl = b.total>=1000 ? Math.round(b.total/1000)+'k' : b.total;
    return `<g>
      <rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="4" fill="${fill}" opacity="${isCur?1:.65}"/>
      <text x="${x+barW/2}" y="${chartH+14}" text-anchor="middle" font-size="9" fill="var(--muted)" font-family="-apple-system,sans-serif">${months[b.month].slice(0,3)}</text>
      <text x="${x+barW/2}" y="${y-4}" text-anchor="middle" font-size="9" fill="var(--muted)" font-family="-apple-system,sans-serif">${lbl}</text>
    </g>`;
  }).join('');

  const totalAll = data.reduce((s,p)=>s+(Number(p.amount)||0), 0);
  document.getElementById('bar-sum').textContent = fmt(totalAll)||'₪0';
  document.getElementById('bar-count').textContent = bars.length+' חודשים';

  const gridItems = bars.slice().reverse().map(b=>{
    const isCur = b.key === currentKey;
    return `<div class="month-row-item${isCur?' highlight':''}">
      <span class="mri-label">${months[b.month]} ${b.year}</span>
      <span class="mri-val${isCur?' bordeaux':''}">${fmt(b.total)}</span>
    </div>`;
  }).join('');

  document.getElementById('list').innerHTML = `
    <div class="graph-card">
      <div class="graph-title">הכנסות לפי חודש</div>
      <div class="graph-scroll">
        <svg width="${totalW}" height="${chartH+22}" viewBox="0 0 ${totalW} ${chartH+22}" style="display:block">${svgBars}</svg>
      </div>
    </div>
    <div class="month-grid">${gridItems}</div>
  `;
}

// ── MONTHS VIEW
function renderMonths(){
  document.getElementById('search-wrap').style.display='';
  const q = getQ();
  const items = data.filter(p=>!q||(p.name?.toLowerCase().includes(q)||p.client?.toLowerCase().includes(q)||p.cat?.toLowerCase().includes(q)));
  const groups = {};
  items.forEach(p=>{
    if(!p.exec) return;
    const d = new Date(p.exec+'T12:00:00');
    const key = monthKey(d);
    if(!groups[key]) groups[key] = {key, year:d.getFullYear(), month:d.getMonth(), items:[]};
    groups[key].items.push(p);
  });
  const sorted = Object.values(groups).sort((a,b)=>a.year!==b.year?b.year-a.year:b.month-a.month);
  const totalAll = items.reduce((s,p)=>s+(Number(p.amount)||0), 0);
  document.getElementById('bar-sum').textContent = fmt(totalAll)||'₪0';
  document.getElementById('bar-count').textContent = items.length+' פרויקטים';
  const now = new Date(), currentKey = monthKey(now);
  const freq = clientFreqMap();
  const list = document.getElementById('list');
  if(!sorted.length){ list.innerHTML=`<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">אין פרויקטים</div></div>`; return; }
  list.innerHTML = sorted.map(g=>{
    const isOpen = openMonths.has(g.key), isCur = g.key === currentKey;
    const total = g.items.reduce((s,p)=>s+(Number(p.amount)||0), 0);
    const paid = g.items.filter(p=>p.pay==='שולם במלואו').reduce((s,p)=>s+(Number(p.amount)||0), 0);
    const invoice = g.items.filter(p=>p.pay==='נשלחה דרישת תשלום').reduce((s,p)=>s+(Number(p.amount)||0), 0);
    const unpaid = Math.max(0, total-paid-invoice);
    const pp=total?(paid/total*100):0, ip=total?(invoice/total*100):0, up=total?(unpaid/total*100):0;
    const w=s=>`rgba(255,255,255,${s})`, gc=v=>isCur?w(v):`var(${v})`;
    const cardsHtml = g.items.slice().sort((a,b)=>(a.exec||'')>(b.exec||'')?1:-1).map(p=>cardHtml(p,freq)).join('');
    return `<div class="month-group">
      <div class="month-header${isCur?' current':''}${isOpen?' open':''}" onclick="toggleMonth('${g.key}')">
        <div class="month-row1"><div class="month-title">${months[g.month]} ${g.year}</div>
          <div class="month-right"><div class="month-sum">${fmt(total)}</div><span class="month-chevron">▼</span></div>
        </div>
        <div class="month-meta">${g.items.length} פרויקטים</div>
        <div class="month-bar">
          ${pp>0?`<div class="month-bar-seg" style="width:${pp}%;background:${gc('--green')}"></div>`:''}
          ${ip>0?`<div class="month-bar-seg" style="width:${ip}%;background:${gc('--blue')}"></div>`:''}
          ${up>0?`<div class="month-bar-seg" style="width:${up}%;background:${gc('--red')}"></div>`:''}
        </div>
        <div class="month-legend">
          ${paid>0?`<span class="month-legend-item"><span class="month-legend-dot" style="background:${gc('--green')}"></span>${fmt(paid)} שולם</span>`:''}
          ${invoice>0?`<span class="month-legend-item"><span class="month-legend-dot" style="background:${gc('--blue')}"></span>${fmt(invoice)} דרישה נשלחה</span>`:''}
          ${unpaid>0?`<span class="month-legend-item"><span class="month-legend-dot" style="background:${gc('--red')}"></span>${fmt(unpaid)} לשלוח דרישה</span>`:''}
        </div>
      </div>
      ${isOpen?`<div class="month-cards">${cardsHtml}</div>`:''}
    </div>`;
  }).join('');
  attachSwipes();
}

function cardHtml(p, freq){
  const isRecurring = p.client && (freq[p.client]||0) > 1;
  // Aging
  let ageClass='',ageChip='';
  if(p.pay!=='שולם במלואו' && p.due){
    const daysOver=Math.floor((Date.now()-new Date(p.due+'T12:00:00').getTime())/86400000);
    if(daysOver>=14){ageClass=' age-danger';ageChip=`<span class="age-chip danger">⚠️ ${daysOver} ימים</span>`;}
    else if(daysOver>=5){ageClass=' age-warn';ageChip=`<span class="age-chip warn">${daysOver} ימים</span>`;}
  }
  // Effort
  const ef=getEffort(p.id);
  const efBadge=ef?`<span class="effort-badge">${'⭐'.repeat(ef)}</span>`:'';
  return `<div class="swipe-wrap"><div class="swipe-bg-r">✓ שולם</div><div class="swipe-bg-l">◐ בתהליך</div><div class="card${ageClass}" data-pid="${p.id}" onclick="openModal('${p.id}')">
    <div class="card-top">
      <div class="card-name">${p.name}${isRecurring?'<span style="color:var(--amber);font-size:10px;margin-right:5px" title="לקוח חוזר"> ↺</span>':''}</div>
      ${p.amount?`<div class="card-amount">${fmt(p.amount)}</div>`:''}
      <button class="dup-btn" onclick="dupProject('${p.id}',event)" title="שכפל פרויקט">📋</button>
    </div>
    <div class="card-row2">
      <div class="badges">${catBadge(p.cat)}${spBadgeQ(p.sp||'טרם החל', p.id)}${payBadgeQ(p.pay||'טרם שולם', p.id)}${ageChip}${efBadge}</div>
      ${p.client?`<span class="card-meta"><span class="client-name-link" onclick="event.stopPropagation();showClient('${esc(p.client)}')">${p.client}</span>${p.exec?' · '+fmtDate(p.exec):''}</span>`:(p.exec?`<span class="card-meta">${fmtDate(p.exec)}</span>`:'')}
    </div>
    ${p.notes?`<div class="card-notes" style="display:flex;align-items:flex-start;gap:4px"><span style="flex:1">💬 ${p.notes}</span><button class="note-edit-btn" onclick="openNoteEditor('${p.id}',event)">✏️</button></div>`:`<button class="note-edit-btn" style="margin-top:4px" onclick="openNoteEditor('${p.id}',event)">+ הערה</button>`}
  </div></div>`;
}

function render(){
  const now = new Date();
  const curMK = monthKey(now);
  document.getElementById('month-label').textContent = months[now.getMonth()]+' '+now.getFullYear();
  const tabEl=document.getElementById('tab-month-current'); if(tabEl) tabEl.textContent='חודש '+months[now.getMonth()];

  // ── Context-aware summary cards
  const sumAmt = d => d.reduce((s,p)=>s+(Number(p.amount)||0), 0);
  const unpaidOf = d => d.filter(p=>p.pay!=='שולם במלואו');
  const inCurMonth = d => d.filter(p=>p.exec&&monthKey(new Date(p.exec+'T12:00:00'))===curMK);
  const curMonthData = inCurMonth(data);

  let sumVal, sum2Val, pendingVal, countVal;
  let sumLabel = 'סה״כ ₪', sum2Label = 'החודש ₪';

  if(filter==='month'){
    sumLabel='החודש ₪'; sum2Label='שולם ₪';
    sumVal=sumAmt(curMonthData);
    sum2Val=sumAmt(curMonthData.filter(p=>p.pay==='שולם במלואו'));
    pendingVal=sumAmt(unpaidOf(curMonthData));
    countVal=curMonthData.length;
  } else if(filter==='unpaid'){
    const f=data.filter(p=>p.pay==='טרם שולם');
    sumLabel='לשלוח דרישה'; sum2Label='החודש ₪';
    sumVal=sumAmt(f);
    sum2Val=sumAmt(inCurMonth(f));
    pendingVal=sumAmt(f);
    countVal=f.length;
  } else if(filter==='invoice'){
    const f=data.filter(p=>p.pay==='נשלחה דרישת תשלום');
    sumLabel='נשלחה דרישה'; sum2Label='החודש ₪';
    sumVal=sumAmt(f);
    sum2Val=sumAmt(inCurMonth(f));
    pendingVal=sumAmt(f);
    countVal=f.length;
  } else if(filter==='done'){
    const f=data.filter(p=>p.pay==='שולם במלואו');
    sumLabel='שולם ₪'; sum2Label='החודש ₪';
    sumVal=sumAmt(f);
    sum2Val=sumAmt(inCurMonth(f));
    pendingVal=0;
    countVal=f.length;
  } else {
    // הכל / חודשים קודמים / גרף — global
    sumVal=sumAmt(data);
    sum2Val=sumAmt(curMonthData);
    pendingVal=sumAmt(unpaidOf(data));
    countVal=data.length;
  }

  document.getElementById('s-label-1').textContent = sumLabel;
  document.getElementById('s-label-2').textContent = sum2Label;
  document.getElementById('c-sum').textContent = fmt(sumVal)||'₪0';
  document.getElementById('c-month').textContent = fmt(sum2Val)||'₪0';
  document.getElementById('c-pending').textContent = fmt(pendingVal)||'₪0';
  document.getElementById('c-total').textContent = countVal;
  const bm=getBestMonth();
  document.getElementById('best-month-label').textContent=bm?bm.label:'—';
  document.getElementById('best-month-val').textContent=bm?fmt(bm.amount):'—';
  // Tax estimate
  const yearItems=data.filter(p=>{if(!p.exec)return false;return new Date(p.exec+'T12:00:00').getFullYear()===now.getFullYear();});
  const yGross=yearItems.reduce((s,p)=>s+(Number(p.amount)||0),0);
  const yNet=Math.round(yGross*0.65);
  document.getElementById('tax-gross').textContent=yGross?'ברוטו: '+fmt(yGross):'';
  document.getElementById('tax-net').textContent=yNet?fmt(yNet):'—';

  const clients = [...new Set(data.map(p=>p.client).filter(Boolean))];
  document.getElementById('dl-clients').innerHTML = clients.map(c=>`<option value="${c}">`).join('');

  if(filter==='months'){ renderMonths(); return; }
  if(filter==='graph'){ renderGraph(); return; }

  document.getElementById('search-wrap').style.display = '';
  const freq = clientFreqMap();
  const filtered = getFiltered().sort((a,b)=>{
    if(!a.exec&&!b.exec) return 0; if(!a.exec) return 1; if(!b.exec) return -1;
    if(filter==='month') return new Date(a.exec+'T12:00:00') - new Date(b.exec+'T12:00:00');
    return new Date(b.exec+'T12:00:00') - new Date(a.exec+'T12:00:00');
  });
  const bsum = filtered.reduce((s,p)=>s+(Number(p.amount)||0), 0);
  document.getElementById('bar-sum').textContent = fmt(bsum)||'₪0';
  document.getElementById('bar-count').textContent = filtered.length+' פרויקטים';
  const list = document.getElementById('list');
  if(!filtered.length){ list.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">אין פרויקטים</div><div class="empty-sub">לחצי על ➕ כדי להתחיל</div></div>`; return; }
  list.innerHTML = filtered.map(p=>cardHtml(p,freq)).join('');
  attachSwipes();
  attachLongPress();
  if(filter==='month'||filter==='unpaid') maybeShowSwipeHint();
}

  filter = f;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));

}

function openModal(id){

  document.getElementById('btn-del').style.display = id ? 'block' : 'none';

      document.getElementById('f-cat').value = p.cat||'';
      document.getElementById('f-sp').value = p.sp||'טרם החל';
      document.getElementById('f-pay').value = p.pay||'טרם שולם';
      document.getElementById('f-amount').value = p.amount||'';
      document.getElementById('f-exec').value = p.exec||'';
      document.getElementById('f-due').value = p.due||'';

}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); editId=null; }
function overlayClick(e){ if(e.target===document.getElementById('overlay')) closeModal(); }

async function save(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ document.getElementById('f-name').focus(); return; }
  const p = {
    name,
    client: document.getElementById('f-client').value.trim(),
    cat: document.getElementById('f-cat').value,
    sp: document.getElementById('f-sp').value,
    pay: document.getElementById('f-pay').value,
    amount: document.getElementById('f-amount').value,
    exec: document.getElementById('f-exec').value,
    due: document.getElementById('f-due').value,
    notes: document.getElementById('f-notes').value.trim()
  };
  if(editId){
    const i = data.findIndex(x=>x.id===editId);
    if(i!==-1) data[i] = {...data[i], ...p};
    setEffortForId(editId, _ef);
    persistLocal();
    render();
    closeModal();
    await syncProject(data.find(x=>x.id===editId));
  } else {
    p.id = uid();
    p.createdAt = new Date().toISOString();
    setEffortForId(p.id, _ef);
    data.unshift(p);
    persistLocal();
    render();
    closeModal();
    await syncProject(p);
  }
}

async function del(){
  if(!editId) return;
  if(!confirm('למחוק את הפרויקט הזה?')) return;
  const id = editId;
  data = data.filter(p=>p.id!==id);
  persistLocal();
  render();
  closeModal();
  await deleteProject(id);
}

function exportData(){
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  a.href = url;
  a.download = `crm-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── BEST MONTH
function getBestMonth(){
  const groups={};
  data.forEach(p=>{
    if(!p.exec) return;
    const d=new Date(p.exec+'T12:00:00');
    const key=monthKey(d);
    groups[key]=(groups[key]||0)+(Number(p.amount)||0);
  });
  let best=null,bestAmt=0;
  Object.entries(groups).forEach(([k,v])=>{if(v>bestAmt){bestAmt=v;best=k;}});
  if(!best) return null;
  const [y,m]=best.split('-');
  return {label:months[parseInt(m)-1]+' '+y,amount:bestAmt};
}

function attachSwipes(){
  document.querySelectorAll('.swipe-wrap').forEach(wrap=>{
    const card=wrap.querySelector('.card');
    if(!card||card._sw) return;
    card._sw=true;
    const pid=card.dataset.pid;
    const rBg=wrap.querySelector('.swipe-bg-r');
    const lBg=wrap.querySelector('.swipe-bg-l');
    const THRESH=72;
    let sx=0,sy=0,swiping=false,dx=0;
    card.addEventListener('touchstart',e=>{
      sx=e.touches[0].clientX; sy=e.touches[0].clientY;
      swiping=false; dx=0;
      card.style.transition='none';
    },{passive:true});
    card.addEventListener('touchmove',e=>{
      dx=e.touches[0].clientX-sx;
      const dy=e.touches[0].clientY-sy;
      if(!swiping&&Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>12) swiping=true;
      if(swiping){
        e.preventDefault();
        card.style.transform=`translateX(${dx*0.65}px)`;
        if(dx>0){rBg.style.opacity=Math.min(dx/THRESH,1);lBg.style.opacity=0;}
        else{lBg.style.opacity=Math.min(-dx/THRESH,1);rBg.style.opacity=0;}
      }
    },{passive:false});
    card.addEventListener('touchend',e=>{
      card.style.transition='transform .22s ease';
      if(swiping&&dx>THRESH){
        card.style.transform='translateX(105%)';
        setTimeout(()=>{quickPayStatus(pid,'שולם במלואו');},220);
      } else if(swiping&&dx<-THRESH){
        card.style.transform='translateX(-105%)';
        setTimeout(()=>{quickSpStatus(pid,'בתהליך');},220);
      } else {
        card.style.transform='';
      }
      rBg.style.opacity=0; lBg.style.opacity=0;
      swiping=false;
    },{passive:true});
  });
}

// ── QUICK STATUS MENUS
const isMobile = () => window.innerWidth <= 600 || ('ontouchstart' in window);

function spBadgeQ(s, pid) {
  const m = {'טרם החל':'bgr','בתהליך':'bip','בוצע':'bov'};
  return `<span class="badge ${m[s]||'bgr'} pay-btn" onclick="showSpQuick('${pid}',event)">${s}</span>`;
}
let _qmSpPid = null;
function showSpQuick(pid, e) {
  e.stopPropagation();
  e.preventDefault();
  _qmSpPid = pid;
  const p = data.find(x => x.id === pid);
  if (!p) return;
  const options = ['טרם החל','בתהליך','בוצע'];
  const icons = {'טרם החל':'⬜','בתהליך':'🔄','בוצע':'✅'};
  _openQuickMenu(
    'סטטוס פרויקט',
    options,
    icons,
    p.sp||'טרם החל',
    opt => pickSp(opt),
    e
  );
}
function pickSp(status) {
  const pid = _qmSpPid;
  closeQuickMenu();
  if (!pid) return;
  quickSpStatus(pid, status);
}

function payBadgeQ(s, pid) {
  const cls={'טרם שולם':'br','נשלחה דרישת תשלום':'bb','שולם במלואו':'bg'};
  const pre={'טרם שולם':'','נשלחה דרישת תשלום':'📤 ','שולם במלואו':'✓ '};
  return `<span class="badge ${cls[s]||'bgr'} pay-btn" onclick="showPayQuick('${pid}',event)">${(pre[s]||'')+s}</span>`;
}
let _qmPid = null;
function showPayQuick(pid, e) {
  e.stopPropagation();
  e.preventDefault();
  _qmPid = pid;
  const p = data.find(x => x.id === pid);
  if (!p) return;
  const options = ['טרם שולם','נשלחה דרישת תשלום','שולם במלואו'];
  const icons = {'טרם שולם':'🔴','נשלחה דרישת תשלום':'📤','שולם במלואו':'✅'};
  _openQuickMenu(
    'סטטוס תשלום',
    options,
    icons,
    p.pay||'טרם שולם',
    opt => pickPay(opt),
    e
  );
}

/* shared menu builder */
function _openQuickMenu(title, options, icons, current, onPick, e) {
  const menu = document.getElementById('quick-menu');
  menu.innerHTML = `<div class="qm-title">${title}</div>` +
    options.map(opt => {
      const active = current === opt;
      return `<button class="qm-item${active?' qm-active':''}" onclick="_pickQm(${JSON.stringify(opt)})">`
        + `<span>${icons[opt]}</span><span>${opt}</span>`
        + (active ? '<span class="qm-check">✓</span>' : '')
        + '</button>';
    }).join('');
  menu._onPick = onPick;

  /* overlay */
  let ov = document.getElementById('qm-ov');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'qm-ov';
    ov.className = 'qm-overlay';
    ov.onclick = closeQuickMenu;
    document.body.appendChild(ov);
  }
  ov.style.display = 'block';
  menu.style.display = 'block';

  if (isMobile()) {
    /* bottom sheet */
    menu.classList.add('sheet');
    menu.style.top = '';
    menu.style.left = '';
  } else {
    /* desktop dropdown near badge */
    menu.classList.remove('sheet');
    const rect = e.target.getBoundingClientRect();
    const mw = menu.offsetWidth || 220;
    const mh = menu.offsetHeight || 160;
    let top = rect.bottom + 6;
    let left = rect.right - mw;
    if (top + mh > window.innerHeight) top = rect.top - mh - 6;
    if (left < 8) left = 8;
    if (left + mw > window.innerWidth) left = window.innerWidth - mw - 8;
    menu.style.top = top + 'px';
    menu.style.left = left + 'px';
  }
}
function _pickQm(opt) {
  const menu = document.getElementById('quick-menu');
  if (menu._onPick) menu._onPick(opt);
}
function pickPay(status) {
  const pid = _qmPid;
  closeQuickMenu();
  if (!pid) return;
  quickPayStatus(pid, status);
}
function closeQuickMenu() {
  const m = document.getElementById('quick-menu');
  if (m) { m.style.display = 'none'; m.classList.remove('sheet'); }
  const ov = document.getElementById('qm-ov');
  if (ov) ov.style.display = 'none';
  _qmPid = null;
  _qmSpPid = null;
}


// ── TOAST
let _toastTimer=null;
function showToast(msg, undoFn){
  document.getElementById('toast-msg').textContent=msg;
  const btn=document.getElementById('toast-undo');
  btn.style.display=undoFn?'inline':'none';
  if(undoFn) btn.onclick=()=>{clearTimeout(_toastTimer);hideToast();undoFn();};
  document.getElementById('toast').classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(hideToast,3000);
}
function hideToast(){document.getElementById('toast').classList.remove('show');}

// ── SWIPE HINT (once per device)
function maybeShowSwipeHint(){
  if(localStorage.getItem('crm_swipe_shown')) return;
  const hint=document.getElementById('swipe-hint');
  hint.classList.add('show');
  localStorage.setItem('crm_swipe_shown','1');
  setTimeout(()=>hint.classList.remove('show'),5000);
}
function dismissSwipeHint(){document.getElementById('swipe-hint').classList.remove('show');}

// ── NOTE EDITOR
function openNoteEditor(pid,e){
  if(e) e.stopPropagation();
  const p=data.find(x=>x.id===pid);
  if(!p) return;
  document.getElementById('note-pid').value=pid;
  document.getElementById('note-project-name').textContent=p.name;
  document.getElementById('note-text').value=p.notes||'';
  document.getElementById('note-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('note-text').focus(),350);
}
function closeNoteEditor(){document.getElementById('note-overlay').classList.remove('open');}
async function saveNote(){
  const pid=document.getElementById('note-pid').value;
  const notes=document.getElementById('note-text').value.trim();
  const i=data.findIndex(x=>x.id===pid);
  if(i===-1) return;
  data[i].notes=notes;
  persistLocal();
  render();
  closeNoteEditor();
  showToast('הערה נשמרה ✓');
  await syncProject(data[i]);
}

// ── LONG PRESS → action sheet
function attachLongPress(){
  document.querySelectorAll('.card[data-pid]').forEach(card=>{
    if(card._lp) return;
    card._lp=true;
    const pid=card.dataset.pid;
    let timer=null, moved=false, sx=0, sy=0;
    const cancel=()=>{clearTimeout(timer); card.classList.remove('pressing');};
    card.addEventListener('touchstart',e=>{
      sx=e.touches[0].clientX; sy=e.touches[0].clientY; moved=false;
      timer=setTimeout(()=>{
        if(!moved){ card.classList.remove('pressing'); showCardActions(pid); }
      },520);
      card.classList.add('pressing');
    },{passive:true});
    card.addEventListener('touchmove',e=>{
      if(Math.abs(e.touches[0].clientX-sx)>8||Math.abs(e.touches[0].clientY-sy)>8){moved=true;cancel();}
    },{passive:true});
    card.addEventListener('touchend',cancel,{passive:true});
    card.addEventListener('touchcancel',cancel,{passive:true});
  });
}

function showCardActions(pid){
  const p=data.find(x=>x.id===pid);
  if(!p) return;
  const menu=document.getElementById('quick-menu');
  menu.innerHTML=
    '<div class="qm-title">'+p.name+'</div>'+
    '<button class="qm-item" onclick="_pickQm(\'edit\')"><span>✏️</span><span>עריכה מלאה</span></button>'+
    '<button class="qm-item" onclick="_pickQm(\'pay\')"><span>💳</span><span>שנה תשלום</span></button>'+
    '<button class="qm-item" onclick="_pickQm(\'sp\')"><span>🔄</span><span>שנה סטטוס פרויקט</span></button>'+
    '<button class="qm-item" onclick="_pickQm(\'note\')"><span>📝</span><span>ערוך הערה</span></button>'+
    '<button class="qm-item" onclick="_pickQm(\'dup\')"><span>📋</span><span>שכפל פרויקט</span></button>'+
    '<button class="qm-item" style="color:var(--red)" onclick="_pickQm(\'del\')"><span>🗑️</span><span>מחיקה</span></button>';
  menu._onPick=opt=>{
    if(opt==='edit') openModal(pid);
    else if(opt==='pay'){
      _qmPid=pid;
      const fakeE={stopPropagation:()=>{},preventDefault:()=>{},target:{getBoundingClientRect:()=>({bottom:window.innerHeight*0.5,top:window.innerHeight*0.5,left:window.innerWidth*0.5,right:window.innerWidth*0.5})}};
      showPayQuick(pid,fakeE);
      return;
    }
    else if(opt==='sp'){
      _qmSpPid=pid;
      const fakeE={stopPropagation:()=>{},preventDefault:()=>{},target:{getBoundingClientRect:()=>({bottom:window.innerHeight*0.5,top:window.innerHeight*0.5,left:window.innerWidth*0.5,right:window.innerWidth*0.5})}};
      showSpQuick(pid,fakeE);
      return;
    }
    else if(opt==='note') openNoteEditor(pid,null);
    else if(opt==='dup') dupProject(pid,null);
    else if(opt==='del'){
      if(confirm('למחוק את הפרויקט הזה?')){
        data=data.filter(x=>x.id!==pid);
        persistLocal(); render(); deleteProject(pid);
      }
    }
  };
  let ov=document.getElementById('qm-ov');
  if(!ov){ov=document.createElement('div');ov.id='qm-ov';ov.className='qm-overlay';ov.onclick=closeQuickMenu;document.body.appendChild(ov);}
  ov.style.display='block';
  menu.classList.add('sheet');
  menu.style.display='block';
  menu.style.top=''; menu.style.left='';
}

// ── BOOT
if(sessionStorage.getItem('crm_auth')==='1'){
  initData();
}
</script>
